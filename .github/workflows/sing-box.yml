name: sing-box
on:
  workflow_dispatch:
  schedule:
    - cron: "0 */1 * * *"

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      SING_BOX_PLATFORM: linux-amd64
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Get sing-box version
        id: sing-box-version
        shell: pwsh
        run: |
          $json = Invoke-RestMethod 'https://api.github.com/repos/SagerNet/sing-box/releases/latest'
          $tag = $json.tag_name
          $latestVersion = $tag -replace '^v', ''
          $assetName = "sing-box-$latestVersion-$env:SING_BOX_PLATFORM.tar.gz"
          $asset = $json.assets | Where-Object { $_.name -eq $assetName } | Select-Object -First 1
          if ($null -eq $asset) {
            throw "Unable to find release asset: $assetName"
          }
          $assetKey = if ($asset.digest) { $asset.digest } else { $asset.updated_at }
          $assetKey = $assetKey -replace '[^A-Za-z0-9_.-]', '-'
          "version=$latestVersion" >> $env:GITHUB_OUTPUT
          "url=$($asset.browser_download_url)" >> $env:GITHUB_OUTPUT
          "asset_name=$assetName" >> $env:GITHUB_OUTPUT
          "asset_key=$assetKey" >> $env:GITHUB_OUTPUT

      - name: Cache sing-box
        id: cache-sing-box
        uses: actions/cache@v6
        with:
          path: sing-box/sing-box
          key: sing-box-${{ env.SING_BOX_PLATFORM }}-${{ steps.sing-box-version.outputs.version }}-${{ steps.sing-box-version.outputs.asset_key }}

      - name: Get sing-box
        if: steps.cache-sing-box.outputs.cache-hit != 'true'
        shell: pwsh
        env:
          SING_BOX_URL: ${{ steps.sing-box-version.outputs.url }}
          SING_BOX_ASSET_NAME: ${{ steps.sing-box-version.outputs.asset_name }}
        run: |
          Invoke-WebRequest -Uri $env:SING_BOX_URL -OutFile $env:SING_BOX_ASSET_NAME
          tar -xzf $env:SING_BOX_ASSET_NAME
          $archiveName = [System.IO.Path]::GetFileNameWithoutExtension($env:SING_BOX_ASSET_NAME)
          $extractedDirectory = [System.IO.Path]::GetFileNameWithoutExtension($archiveName)
          Move-Item -Path (Join-Path $extractedDirectory 'sing-box') -Destination 'sing-box/sing-box' -Force
          Remove-Item $extractedDirectory -Recurse -Force
          Remove-Item $env:SING_BOX_ASSET_NAME

      - name: Generate domains.china
        shell: pwsh
        working-directory: ./sing-box
        run: |
          ./domains.china.ps1
          ./sing-box rule-set compile domains.china.json

      - name: Generate chnroutes2
        shell: pwsh
        working-directory: ./sing-box
        run: |
          ./chnroutes2.ps1
          ./sing-box rule-set compile chnroutes2.json

      - name: Generate as32590
        shell: pwsh
        working-directory: ./sing-box
        run: |
          ./as32590.ps1
          ./sing-box rule-set compile as32590.json

      - name: Publish
        working-directory: ./sing-box
        run: |
          mkdir publish
          mv *.srs publish/
          cd publish/
          git init
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b sing-box
          git add .
          git commit -m "Update sing-box rules"
          git remote add origin "https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}"
          git push -f origin sing-box
